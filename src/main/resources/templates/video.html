<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Globe Video</title>
    <style>
        /* Center the video and give the div some styling */
        .video-container {
            width: 700px;
            margin: 50px auto;
            padding: 20px;
            border: 2px solid #ccc;
            border-radius: 10px;
            background-color: #f9f9f9;
            text-align: center;
        }

        .video-container video {
            width: 100%;
            height: auto;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div class="video-container">
    <h2>Watch the Globe Video</h2>
    <video controls>
        <source th:src="@{/videos/globe.mp4}" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</div>
</body>
</html>
